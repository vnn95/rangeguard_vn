name: rangeguard_vn
description: Hệ thống quản lý tuần tra rừng thông minh - RangerGuard VN
publish_to: "none"
version: 1.0.0+1

environment:
  sdk: ">=3.4.0 <4.0.0"

dependencies:
  flutter:
    sdk: flutter
  flutter_localizations:
    sdk: flutter

  # State Management
  flutter_riverpod: ^2.5.1
  riverpod_annotation: ^2.3.5

  # Navigation
  go_router: ^14.2.0

  # Supabase
  supabase_flutter: ^2.5.3

  # Maps
  flutter_map: ^7.0.2
  flutter_map_tile_caching: ^9.1.3
  latlong2: ^0.9.1

  # Local Storage (Offline)
  hive_flutter: ^1.1.0
  hive: ^2.2.3

  # UI Components
  table_calendar: ^3.1.2
  fl_chart: ^0.68.0
  cached_network_image: ^3.3.1
  shimmer: ^3.0.0
  flutter_svg: ^2.0.10+1
  image_picker: ^1.1.2
  photo_view: ^0.15.0
  badges: ^3.1.2

  # Location & GPS
  geolocator: ^12.0.0
  permission_handler: ^11.3.1

  # File & Export
  path_provider: ^2.1.3
  file_picker: ^8.0.3
  share_plus: ^9.0.0
  pdf: ^3.11.1
  printing: ^5.13.2
  excel: ^4.0.3

  # Utilities
  intl: ^0.19.0
  uuid: ^4.4.0
  dio: ^5.6.0
  connectivity_plus: ^6.0.3
  dart_geohash: ^2.0.0
  crypto: ^3.0.3
  logger: ^2.4.0
  equatable: ^2.0.5
  freezed_annotation: ^2.4.4
  json_annotation: ^4.9.0
  collection: ^1.18.0
  path: ^1.9.0
  rxdart: ^0.28.0
  flutter_dotenv: ^5.1.0
  url_launcher: ^6.3.0
  package_info_plus: ^8.0.0
  device_info_plus: ^10.1.0
  wakelock_plus: ^1.2.8
  local_auth: ^2.3.0
  flutter_background_service: ^5.0.5
  flutter_local_notifications: ^17.2.2

dev_dependencies:
  flutter_test:
    sdk: flutter
  build_runner: ^2.4.11
  riverpod_generator: ^2.4.3
  freezed: ^2.5.7
  json_serializable: ^6.8.0
  hive_generator: ^2.0.1
  flutter_lints: ^4.0.0
  mockito: ^5.4.4

flutter:
  uses-material-design: true

  assets:
    - .env
    - assets/images/
    - assets/icons/
    - assets/data/

  fonts:
    - family: Inter
      fonts:
        - asset: assets/fonts/Inter-Regular.ttf
        - asset: assets/fonts/Inter-Medium.ttf
          weight: 500
        - asset: assets/fonts/Inter-SemiBold.ttf
          weight: 600
        - asset: assets/fonts/Inter-Bold.ttf
          weight: 700
