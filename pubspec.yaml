name: rangeguard_vn
description: Hệ thống quản lý tuần tra rừng thông minh - RangerGuard VN
publish_to: "none"
version: 1.0.0+1

environment:
  sdk: ">=3.4.0 <4.0.0"

dependencies:
  flutter:
    sdk: flutter
  flutter_localizations:
    sdk: flutter

  # State Management
  flutter_riverpod: ^2.5.1

  # Navigation
  go_router: ^14.2.0

  # Supabase
  supabase_flutter: ^2.5.3

  # Maps
  flutter_map: ^7.0.2
  latlong2: ^0.9.1

  # Local Storage (Offline)
  hive_flutter: ^1.1.0
  hive: ^2.2.3

  # UI Components
  table_calendar: ^3.1.2
  fl_chart: ^0.68.0
  cached_network_image: ^3.3.1
  shimmer: ^3.0.0
  flutter_svg: ^2.0.10+1
  image_picker: ^1.1.2
  badges: ^3.1.2

  # Location & GPS
  geolocator: ^12.0.0
  permission_handler: ^11.3.1

  # File & Export
  path_provider: ^2.1.3
  file_picker: ^8.0.3
  share_plus: ^10.0.0
  pdf: ^3.11.1
  printing: ^5.13.2

  # Utilities
  intl: ^0.20.0
  uuid: ^4.4.0
  connectivity_plus: ^6.0.3
  logger: ^2.4.0
  collection: ^1.18.0
  flutter_dotenv: ^5.1.0
  url_launcher: ^6.3.0
  package_info_plus: ^8.0.0
  wakelock_plus: ^1.2.8
  flutter_local_notifications: ^17.2.2

  cupertino_icons: ^1.0.8

dev_dependencies:
  flutter_test:
    sdk: flutter
  flutter_lints: ^4.0.0

flutter:
  uses-material-design: true

  assets:
    - .env
    - assets/images/
    - assets/icons/
    - assets/data/
